source = $HOME/.config/hypr/theme

background {
    monitor = eDP-1
    path = $wallpaper_path
    blur_passes = 2
    blur_size = 2
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# Time
label {    
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = rgb($lock_color_2)
    font_size = 150
    font_family = steelfish outline regular
    position = 0, 30
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgb($lock_color_2)
    font_size = 35
    font_family = SF Pro Display Bold
    position = 0, 140
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 250, 205, 0)
    inner_color = rgba(255, 250, 205, 0.1)
    font_color = rgb($lock_color_2)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground='##$lock_color_2'>Enter Password</span></i>
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}

